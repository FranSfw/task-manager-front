<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Task Manager - Francisco Perez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen flex items-center justify-center">
    
    <div class="w-full max-w-md px-8 py-10 bg-white rounded-xl shadow-sm border border-gray-100">
        <h1 class="text-3xl font-bold mb-6 text-gray-900 tracking-tight text-center">Bienvenido</h1>
        
        <div class="flex flex-col gap-4">
            <input type="text" id="usernameInput" placeholder="Nombre de usuario"
                class="w-full px-3 py-2 border border-gray-200 rounded-md focus:outline-none focus:border-gray-900 transition-colors">
            
            <input type="password" id="passwordInput" placeholder="Contraseña"
                class="w-full px-3 py-2 border border-gray-200 rounded-md focus:outline-none focus:border-gray-900 transition-colors">
            
            <p id="authErrorMsg" class="text-red-500 text-sm hidden text-center"></p>

            <button id="loginBtn" class="bg-gray-900 text-white px-4 py-2 mt-2 rounded-md font-medium hover:bg-gray-700 transition-colors w-full">
                Iniciar Sesión
            </button>
            <button id="registerBtn" class="bg-white text-gray-900 border border-gray-300 px-4 py-2 rounded-md font-medium hover:bg-gray-50 transition-colors w-full">
                Crear cuenta nueva
            </button>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Francisco Perez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-white text-gray-800 antialiased min-h-screen flex justify-center py-16">
    
    <div class="w-full max-w-2xl px-8">
        <div class="flex justify-between items-end mb-8 border-b border-gray-100 pb-4">
            <h1 class="text-4xl font-bold text-gray-900 tracking-tight">Tareas</h1>
            <button id="logoutBtn" class="text-sm font-medium text-gray-400 hover:text-gray-900 transition-colors">
                Cerrar Sesión
            </button>
        </div>

        <div class="flex items-center mb-8 gap-3">
            <input type="text" id="taskInput" placeholder="Añadir una nueva tarea..."
                class="flex-1 px-0 py-2 border-b border-gray-200 focus:outline-none focus:border-gray-900 text-lg transition-colors placeholder-gray-400">
            <button id="addBtn"
                class="bg-gray-900 text-white px-4 py-2 rounded-md font-medium hover:bg-gray-700 transition-colors text-sm">
                Agregar
            </button>
        </div>

        <p id="emptyMsg" class="text-gray-400 italic hidden">No hay tareas actualmente. ¡Todo al día!</p>
        <ul id="taskList" class="space-y-1"></ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
